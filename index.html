<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&G ANDON</title>

    <link rel="stylesheet" href="css/main.css">

    <meta name="theme-color" content="#1B75BC">
</head>

<body>

<header class="top-bar">

    <div class="brand">

        <img src="assets/logo.png" alt="G&G Logo" class="logo">

        <div>
            <h1>G&G ANDON</h1>
            <p>Production Response System</p>
        </div>

    </div>

    <div class="system-status">

        <div class="status-pill ready">
            ● READY
        </div>

        <div id="clock" class="clock">
            12:00 PM
        </div>

    </div>

</header>

<main>

    <div class="button-grid">

        <button class="andon quality">
            <span class="title">QUALITY ISSUE</span>
            <span class="subtitle">
                Immediate Quality Assistance
            </span>
        </button>

        <button class="andon maintenance">
            <span class="title">MAINTENANCE NEEDED</span>
            <span class="subtitle">
                Machine or Equipment Problem
            </span>
        </button>

        <button class="andon material">
            <span class="title">MATERIAL NEEDED</span>
            <span class="subtitle">
                Material Shortage
            </span>
        </button>

        <button class="andon supervisor">
            <span class="title">SUPERVISOR NEEDED</span>
            <span class="subtitle">
                Operator Assistance
            </span>
        </button>

        <button class="andon resume">
            <span class="title">PRODUCTION RESUMED</span>
            <span class="subtitle">
                Resume Normal Operation
            </span>
        </button>

    </div>

</main>

<footer>

<div class="footer-grid">

<div>
<b>Plant</b><br>
G&G Industrial Lighting
</div>

<div>
<b>Department</b><br>
Production
</div>

<div>
<b>Line</b><br>
LED Assembly
</div>

<div>
<b>Station</b><br>
End of Line Inspection
</div>

<div>
<b>Last Alert</b><br>
None
</div>

</div>

</footer>

<script src="js/app.js"></script>

</body>
</html>
